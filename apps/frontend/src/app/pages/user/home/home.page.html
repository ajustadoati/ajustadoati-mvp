<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>AjustadoATi</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="navigateToRequests()" fill="clear">
        <ion-icon name="document-text-outline"></ion-icon>
        <ion-badge *ngIf="hasActiveSearch || hasAcceptedOffer" color="success" class="active-badge">1</ion-badge>
      </ion-button>
      <ion-button (click)="showUserMenu()" fill="clear">
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">
  <div class="home-wrap">
    <!-- Hero (compacto) -->
    <header class="hero">
      <h1>Hola, {{ user?.fullName || 'Usuario' }} 👋</h1>
      <p>Cuéntanos qué necesitas y avisamos a proveedores cercanos.</p>
    </header>

    <!-- Active state cards -->
    <a class="status-banner status-banner--search"
       *ngIf="hasActiveSearch && !hasAcceptedOffer"
       (click)="router.navigate(['/user/waiting-responses'])">
      <ion-icon name="pulse-outline"></ion-icon>
      <div class="status-text">
        <strong>Búsqueda en progreso</strong>
        <span>Toca para ver las respuestas</span>
      </div>
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </a>

    <a class="status-banner status-banner--active"
       *ngIf="hasAcceptedOffer"
       (click)="navigateToActiveRequest()">
      <ion-icon name="car-outline"></ion-icon>
      <div class="status-text">
        <strong>Servicio en curso</strong>
        <span>Tu proveedor está en camino</span>
      </div>
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </a>

    <!-- Form -->
    <form class="form" [formGroup]="serviceForm" (ngSubmit)="onServiceSubmit()">
      <!-- Categoría -->
      <div class="field">
        <label class="field-label">Categoría</label>
        <ion-select
          formControlName="category"
          interface="action-sheet"
          [interfaceOptions]="{ header: 'Categoría del servicio' }"
          placeholder="Selecciona una categoría"
          [disabled]="loadingCategories || serviceCategories.length === 0"
          class="select-control"
          cancelText="Cancelar"
        >
          <ion-select-option
            *ngFor="let category of serviceCategories"
            [value]="category.id"
          >
            {{ category.name }}
          </ion-select-option>
        </ion-select>
        <div class="field-loading" *ngIf="loadingCategories">
          <ion-spinner name="crescent"></ion-spinner>
          <span>Cargando categorías…</span>
        </div>
      </div>

      <!-- Descripción -->
      <div class="field">
        <label class="field-label">¿Qué necesitas?</label>
        <ion-textarea
          formControlName="serviceDescription"
          placeholder="Ej: reparar una lavadora que no centrifuga"
          rows="3"
          maxlength="180"
          [counter]="true"
          autoGrow="true"
          class="textarea-control"
        ></ion-textarea>
      </div>

      <!-- Ubicación -->
      <div class="field">
        <label class="field-label">Tu ubicación</label>
        <button type="button" class="location-row" (click)="refreshLocation()">
          <ion-icon
            [name]="isLocationLoading ? 'hourglass-outline' : 'location'"
            [color]="currentPosition ? 'success' : 'medium'"
            class="location-icon"
          ></ion-icon>
          <span class="location-text">{{ locationText }}</span>
          <ion-icon name="refresh-outline" class="location-refresh"></ion-icon>
        </button>
      </div>

      <!-- Submit -->
      <ion-button
        expand="block"
        type="submit"
        class="submit-button"
        [disabled]="serviceForm.invalid || isLoading || !currentPosition"
      >
        <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
        <ion-icon name="search-outline" slot="start" *ngIf="!isLoading"></ion-icon>
        <span *ngIf="!isLoading">Buscar Proveedores</span>
        <span *ngIf="isLoading">Buscando…</span>
      </ion-button>
    </form>
  </div>
</ion-content>
