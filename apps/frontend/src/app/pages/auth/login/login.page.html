<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">
    <div class="header-section">
      <div class="logo-container">
        <img src="assets/images/logo.png" alt="AjustadoATi" class="brand-logo" />
      </div>
      <p class="app-subtitle">Encuentra el servicio que necesitas</p>
    </div>

    <div class="form-section">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" formControlName="email" autocomplete="email" inputmode="email" placeholder="tu@email.com" />
        </div>
        <div class="error-message" *ngIf="email?.errors?.['required'] && email?.touched">El email es requerido</div>
        <div class="error-message" *ngIf="email?.errors?.['email'] && email?.touched">Ingresa un email válido</div>

        <div class="field-group">
          <label for="login-password">Contraseña</label>
          <input id="login-password" type="password" formControlName="password" autocomplete="current-password" placeholder="Tu contraseña" />
        </div>
        <div class="error-message" *ngIf="password?.errors?.['required'] && password?.touched">La contraseña es requerida</div>
        <div class="error-message" *ngIf="password?.errors?.['minlength'] && password?.touched">Mínimo 6 caracteres</div>

        <button type="submit" class="primary-action" [disabled]="isLoading">
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Iniciar Sesión</span>
        </button>

        <div class="forgot-password-link">
          <a (click)="forgotPassword()">¿Olvidaste tu contraseña?</a>
        </div>
      </form>

      <div class="guest-section">
        <p class="guest-text">¿Solo quieres probar?</p>
        <button type="button" class="secondary-neutral" (click)="tryAsGuest()" [disabled]="isLoading">
          Buscar sin registrarse
        </button>
      </div>

      <div class="register-section">
        <p class="register-text">¿No tienes cuenta?</p>
        <button type="button" class="secondary-action" (click)="goToRegister()" [disabled]="isLoading">Crear cuenta</button>
      </div>
    </div>
  </div>
</ion-content>
