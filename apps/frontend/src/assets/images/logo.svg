<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Background white circle for contrast -->
  <circle cx="100" cy="100" r="95" fill="white" opacity="0.9" filter="url(#glow)"/>

  <!-- Outer circle (magnifying glass handle) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1F2937" stroke-width="8" opacity="0.7"/>

  <!-- Inner circle (magnifying glass lens) -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#brandGradient)" stroke-width="12" filter="url(#glow)"/>

  <!-- Center element - modern icon -->
  <circle cx="100" cy="100" r="25" fill="url(#centerGradient)" filter="url(#glow)"/>
  
  <!-- Tools icon in center -->
  <g transform="translate(100, 100)">
    <!-- Wrench -->
    <path d="M-8,-8 L-8,8 L-2,8 L-2,2 L8,2 L8,-2 L-2,-2 L-2,-8 Z" fill="white" opacity="0.9"/>
    <!-- Screwdriver -->
    <path d="M2,-8 L8,-8 L8,-2 L2,-2 L2,8 L-2,8 L-2,-2 Z" fill="white" opacity="0.7"/>
  </g>

  <!-- Magnifying glass handle with modern styling -->
  <rect x="145" y="145" width="16" height="45" rx="8" fill="#1F2937" transform="rotate(45 153 167.5)" opacity="0.8"/>
  
  <!-- Handle highlight -->
  <rect x="147" y="147" width="6" height="35" rx="3" fill="url(#brandGradient)" transform="rotate(45 150 164.5)" opacity="0.6"/>
</svg>
