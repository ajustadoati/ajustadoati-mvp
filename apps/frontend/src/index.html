<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>AjustadoATi</title>

  <base href="/" />

  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />

  <!-- Google Maps API -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCpagJ3zXZf0mUP6VZV_1yhiYb_qQ0uCao&libraries=places">
  </script>

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <!-- Plausible Analytics (cookieless, GDPR-friendly).
       The defensive queue lets us call window.plausible() before the script
       has loaded; it gets flushed once script.js arrives. -->
  <script defer data-domain="ajustadoati.com" src="https://plausible.io/js/script.js"></script>
  <script>
    window.plausible = window.plausible || function () {
      (window.plausible.q = window.plausible.q || []).push(arguments);
    };
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
