name: Frontend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: ./node_modules/.bin/tsc -p tsconfig.app.json --noEmit

  deploy:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Missing GOOGLE_MAPS_API_KEY secret" >&2
            exit 1
          fi
          sed -i "s|YOUR_PRODUCTION_GOOGLE_MAPS_API_KEY|$GOOGLE_MAPS_API_KEY|g" src/environments/environment.prod.ts
          sed -i 's|key=[^"]*|key='"$GOOGLE_MAPS_API_KEY"'|g' src/index.html
          npm run build -- --configuration production

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build to temporary VPS directory
        run: rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT }}" ./www/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/ajustadoati-frontend-next/"

      - name: Backup current frontend and publish new build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            WEB_ROOT="${{ secrets.VPS_WEB_ROOT }}"
            BACKUP_ROOT="${WEB_ROOT%/}_backups"
            RELEASE_SOURCE="/tmp/ajustadoati-frontend-next"
            TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
            BACKUP_DIR="${BACKUP_ROOT}/${TIMESTAMP}"

            mkdir -p "$BACKUP_ROOT"

            if [ -d "$WEB_ROOT" ] && [ "$(ls -A "$WEB_ROOT" 2>/dev/null)" ]; then
              mkdir -p "$BACKUP_DIR"
              rsync -a "$WEB_ROOT/" "$BACKUP_DIR/"
              echo "Backup created at $BACKUP_DIR"
            else
              echo "No current frontend content found to back up."
            fi

            mkdir -p "$WEB_ROOT"
            rsync -az --delete "$RELEASE_SOURCE/" "$WEB_ROOT/"
            rm -rf "$RELEASE_SOURCE"
