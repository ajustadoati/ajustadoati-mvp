name: Backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile and package
        run: mvn -B -DskipTests package

  build_and_publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ajustadoati-backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build_and_publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload backend compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "apps/backend/deploy/docker-compose.backend.yml"
          target: ${{ secrets.VPS_APP_DIR }}
          strip_components: 3

      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.VPS_APP_DIR }}"
            cd "${{ secrets.VPS_APP_DIR }}"
            if [ ! -f .env.production ]; then
              echo "Missing .env.production in ${{ secrets.VPS_APP_DIR }}" >&2
              exit 1
            fi
            if [ ! -f docker-compose.backend.yml ]; then
              echo "Missing docker-compose.backend.yml in ${{ secrets.VPS_APP_DIR }}" >&2
              exit 1
            fi
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_TOKEN }}"
            export BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/ajustadoati-backend:latest"
            docker compose --env-file .env.production -f docker-compose.backend.yml pull backend
            docker compose --env-file .env.production -f docker-compose.backend.yml up -d backend
            docker image prune -f
